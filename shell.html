<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mystic Onslaught</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh;
      background: #000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    #canvas-wrap {
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
      position: relative;
    }
    #canvas {
      display: block;
      width: 1920px;
      height: 1080px;
    }
    #fs-btn {
      position: fixed;
      bottom: 12px;
      right: 14px;
      z-index: 100;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 14px;
      font-family: sans-serif;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    #fs-btn:hover { background: rgba(255,255,255,0.18); }
  </style>
</head>
<body>
  <div id="canvas-wrap">
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>
  <button id="fs-btn" onclick="toggleFullscreen()">&#x26F6; Fullscreen</button>

  <script>
    var GAME_W = 1920, GAME_H = 1080;

    function scaleGame() {
      var wrap = document.getElementById('canvas-wrap');
      var availW = window.innerWidth;
      var availH = window.innerHeight - (document.fullscreenElement ? 0 : 0);
      var scale = Math.min(availW / GAME_W, availH / GAME_H);
      // Cap default (non-fullscreen) scale at 0.75 so it fits comfortably in a browser tab
      if (!document.fullscreenElement) scale = Math.min(scale, 0.75);
      wrap.style.transform = 'scale(' + scale + ')';
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function(e) {
          console.warn('Fullscreen failed: ' + e.message);
        });
      } else {
        document.exitFullscreen();
      }
    }

    document.addEventListener('fullscreenchange', function() {
      var btn = document.getElementById('fs-btn');
      btn.textContent = document.fullscreenElement ? '✕ Exit Fullscreen' : '⛶ Fullscreen';
      scaleGame();
    });

    window.addEventListener('resize', scaleGame);
    scaleGame();

    var Module = {
      canvas: document.getElementById('canvas'),
      print:    function(t) { console.log(t); },
      printErr: function(t) { console.error(t); },
      setStatus: function(t) { if (t) console.log('[status] ' + t); },
      totalDependencies: 0,
      monitorRunDependencies: function() {}
    };
    window.onerror = function(e) { console.error('JS error: ' + e); };
  </script>

  {{{ SCRIPT }}}
</body>
</html>
