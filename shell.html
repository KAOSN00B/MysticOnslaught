<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mystic Onslaught</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container {
      position: relative;
      background: #000;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>
  <script>
    var GAME_W = 1920, GAME_H = 1080;

    function fitGame() {
      var scale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H);
      var w = Math.floor(GAME_W * scale);
      var h = Math.floor(GAME_H * scale);
      var c = document.getElementById('game-container');
      c.style.width  = w + 'px';
      c.style.height = h + 'px';
    }

    window.addEventListener('resize', fitGame);
    fitGame();

    var Module = {
      canvas: document.getElementById('canvas'),
      print:    function(t) { console.log(t); },
      printErr: function(t) { console.error(t); },
      setStatus: function(t) { if (t) console.log('[status] ' + t); },
      totalDependencies: 0,
      monitorRunDependencies: function() {}
    };
    window.onerror = function(e) { console.error('JS error: ' + e); };
  </script>

  {{{ SCRIPT }}}
</body>
</html>
